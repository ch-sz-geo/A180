name: Manual Model Update

on:
  workflow_dispatch:
    inputs:
      file_path:
        description: 'Path to the ILI file (e.g. models/MyModel.ili)'
        required: true
        type: string
      action:
        description: 'Action to perform on the file'
        required: true
        type: choice
        options:
          - add
          - modify
          - delete

jobs:
  validate-and-dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate input file exists
        run: |
          FILE="${{ github.event.inputs.file_path }}"
          ACTION="${{ github.event.inputs.action }}"

          # Check that the file path starts with models/
          if [[ "$FILE" != models/* ]]; then
            echo "::error::File path must start with 'models/'. Got: $FILE"
            exit 1
          fi

          # For add/modify, the file must exist in the repo
          if [[ "$ACTION" == "add" || "$ACTION" == "modify" ]]; then
            if [ ! -f "$FILE" ]; then
              echo "::error::File not found in repository: $FILE"
              exit 1
            fi
          fi

          # For delete, the file should NOT exist anymore
          if [[ "$ACTION" == "delete" ]]; then
            if [ -f "$FILE" ]; then
              echo "::error::File still exists in the repository: $FILE. Remove it before triggering a delete dispatch."
              exit 1
            fi
          fi

          echo "Validation passed: $ACTION -> $FILE"

      - name: Set up JDK 25
        # Only needed for add/modify, skip for delete
        if: ${{ github.event.inputs.action != 'delete' }}
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'adopt'

      - name: Install ili2c
        if: ${{ github.event.inputs.action != 'delete' }}
        uses: ch-sz-geo/interlis-setup-action/setup-iliCompiler@v1
        with:
          path: ../ili2c

      - name: Validate ILI file
        if: ${{ github.event.inputs.action != 'delete' }}
        run: |
          FILE="${{ github.event.inputs.file_path }}"
          echo "Validating $FILE ..."
          java -jar ../ili2c/ili2c.jar "$FILE"
          echo "Validation passed."

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "models"

      - name: Dispatch to downstream models repo
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          FILE="${{ github.event.inputs.file_path }}"
          ACTION="${{ github.event.inputs.action }}"

          # Build payload, slotting the file into the correct field
          # based on the chosen action, leaving the others empty
          payload=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg sha  "${{ github.sha }}" \
            --arg ref  "${{ github.ref_name }}" \
            --arg file "$FILE" \
            --arg action "$ACTION" \
            '{
              event_type: "update",
              client_payload: {
                repo: $repo,
                sha: $sha,
                ref: $ref,
                add:    (if $action == "add"    then $file else "" end),
                modify: (if $action == "modify" then $file else "" end),
                delete: (if $action == "delete" then $file else "" end),
                rename: ""
              }
            }')

          echo "Dispatching payload:"
          echo "$payload" | jq .

          response=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/ch-sz-geo/models/dispatches \
            -d "$payload")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n -1)

          echo "HTTP Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ne 204 ]; then
            echo "::error::Dispatch failed with status $http_code: $body"
            exit 1
          fi

          echo "Successfully dispatched $ACTION for $FILE to ch-sz-geo/models"
